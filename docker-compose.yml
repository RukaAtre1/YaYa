services:
  yaya-backend:
    build:
      context: ./services/yaya-backend
    container_name: yaya-backend
    env_file:
      - ./services/yaya-backend/.env
    ports:
      - "8787:8787"
    restart: unless-stopped

  yaya-web:
    build:
      context: .
    container_name: yaya-web
    environment:
      NODE_ENV: production
      PORT: 3000
      YAYA_BACKEND_URL: http://yaya-backend:8787
    depends_on:
      - yaya-backend
    ports:
      - "3000:3000"
    restart: unless-stopped
